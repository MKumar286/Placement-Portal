<!DOCTYPE html>
<html>
<head>
<title>MGIT Placement Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
padding:10px;
overflow-x:hidden;
color:white;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c3c);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
min-height:100vh;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating Ambient Blur Accents */
body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:rgba(0,198,255,0.12);
border-radius:50%;
top:-120px;
left:-120px;
filter:blur(100px);
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:400px;
height:400px;
background:rgba(255,0,150,0.12);
border-radius:50%;
bottom:-100px;
right:-100px;
filter:blur(100px);
z-index:-1;
}

/* PREMIUM SOLID FLOATING RED AND BLUE BACKGROUND MIX ON MAIN HEADING */
.header-box{
background: linear-gradient(-45deg, #8b0000, #122244, #a81323, #081630);
background-size: 300% 300%;
animation: floatGlowMove 8s ease infinite;
padding:8px 10px;
border-radius:12px 12px 0 0;
margin-bottom:0;
box-shadow:0 6px 20px rgba(0,0,0,0.45);
border:1px solid rgba(255,255,255,0.15);
border-bottom:none;
text-align:center;
}

/* HEADINGS */
h1{
font-size:24px;
font-weight:bold;
background: linear-gradient(90deg, #ffffff, #ffe082, #ffffff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
margin-bottom:4px;
letter-spacing:0.5px;
}

h3{
font-size:14px;
margin-top:1px;
font-weight:500;
background: linear-gradient(90deg, #b2ff59, #00e5ff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

/* STATS BANNER */
.stats-banner {
display: flex;
flex-wrap: nowrap;
align-items: center;
gap: 3px;
background: rgba(0, 8, 20, 0.7);
padding: 6px;
border: 1px solid rgba(255,255,255,0.12);
border-bottom: 1px solid rgba(255,255,255,0.08);
justify-content: space-between;
}

.stat-card {
flex: 1 1 0px; 
background: rgba(255, 255, 255, 0.06);
border: 1px solid rgba(255,255,255,0.12);
padding: 4px 1px;
border-radius: 4px;
text-align: center;
min-width: 35px;
box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.stat-card .card-label {
font-size: 8px;
text-transform: uppercase;
letter-spacing: 0.1px;
color: #ffe082;
font-weight: bold;
margin-bottom: 1px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.stat-card .card-value {
font-size: 11px;
font-weight: bold;
color: #ffffff;
}

.stats-divider {
font-size: 8px;
font-weight: 900;
color: #b2ff59;
text-transform: uppercase;
white-space: nowrap;
flex: 0 0 auto;
padding: 0 2px;
border-left: 2px solid rgba(255,255,255,0.2);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
line-height: 1.1;
text-align: center;
}

.filter-section {
display:flex;
flex-wrap:nowrap;
gap:4px;
padding:6px;
backdrop-filter:blur(10px);
-webkit-backdrop-filter: blur(10px);
box-shadow:0 6px 20px rgba(0,0,0,0.25);
border:1px solid rgba(255,255,255,0.12);
border-top:none;
align-items: center;
justify-content: space-between;
}

.controls {
background: rgba(255, 255, 255, 0.08);
border-radius:0 0 12px 12px;
margin-bottom:6px;
border-top: 1px solid rgba(255,255,255,0.12);
overflow-x: hidden;
}

/* COMPACT FILTERS ROW FORM STYLES */
.filter-section input,
.filter-section select{
flex: 1 1 0px;
width: 7%;
min-width: 50px;
height:26px;
padding:2px 4px;
font-size:9px;
border-radius:4px;
border:1px solid rgba(255,255,255,0.2);
outline:none;
background: rgba(255, 255, 255, 0.95);
color: #222;
text-overflow: ellipsis;
}

.filter-section input#search {
flex: 1.8 1 0px;
min-width: 100px;
}

.filter-section select#natureFilter {
flex: 1.2 1 0px;
min-width: 70px;
}

.filter-section input:focus,
.filter-section select:focus{
box-shadow:0 0 8px rgba(0,198,255,0.5);
border:1px solid #00c6ff;
}

/* ACTION BAR CONTAINER FOR EXCEL CONTROLLER */
.action-bar {
display: flex;
justify-content: flex-end;
padding: 4px 8px;
margin-bottom: 6px;
background: rgba(0, 8, 20, 0.4);
border-radius: 8px;
border: 1px solid rgba(255, 255, 255, 0.1);
}

.download-btn {
background: linear-gradient(135deg, #1f4068, #162447);
color: white;
border: 1px solid rgba(255, 255, 255, 0.2);
padding: 5px 14px;
font-size: 10px;
font-weight: bold;
border-radius: 6px;
cursor: pointer;
display: flex;
align-items: center;
gap: 6px;
transition: 0.3s ease;
box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

.download-btn:hover {
transform: scale(1.03);
background: linear-gradient(135deg, #107c41, #1f9a55); /* Elegant Excel Green Theme Accent on Hover */
box-shadow: 0 4px 15px rgba(16, 124, 65, 0.4);
}

/* TABLE CONTAINER SETUP */
.table-container{
width:100%;
overflow-x: auto;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.35);
background: rgba(255, 255, 255, 0.03);
}

table{
border-collapse:collapse;
width:100%;
table-layout: auto; 
background:#ffffff;
color:#222;
border-radius:12px;
overflow:hidden;
}

/* GRADIENT SOLID PREMIUM FLOATING COLOUR TO TABLE HEADER */
th{
padding:6px 8px;
font-size:10px;
font-weight:bold;
text-align:center;
background: linear-gradient(-45deg, #1f1c2c, #3a1c71, #6b114d, #111a2e);
background-size: 300% 300%;
animation: floatGlowMove 7s ease infinite;
color:#ffffff;
line-height:1.2;
border:1px solid rgba(255,255,255,0.15);
white-space: nowrap;
text-shadow: 0 1px 2px rgba(0,0,0,0.8);
box-shadow: inset 0 -2px 0px rgba(0, 198, 255, 0.4);
}

/* ANIMATION ENGINE */
@keyframes floatGlowMove {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

td{
padding:4px 6px;
font-size:10px;
font-weight:500;
text-align:center;
white-space: nowrap;
border:1px solid rgba(16,37,66,0.1);
}

tr:nth-child(even){
background:#eef5ff;
}

tr:nth-child(odd){
background:#ffffff;
}

tbody tr:hover{
background:#ffd180;
}

.link-btn{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
padding:1px 3px;
border-radius:3px;
text-decoration:none;
font-size:8px;
font-weight:bold;
line-height:1.1;
display:inline-block;
box-shadow:0 1px 4px rgba(0,0,0,0.2);
}

.link-btn:hover{
background:linear-gradient(135deg,#43cea2,#185a9d);
}

@media(max-width:768px){
.table-container {
  overflow-x: auto;
}
}
</style>
</head>
<body>

<div class="header-box">
<h1>Department-wise Recruiting Companies</h1>
<h3>Academic Year 2025 - 2026</h3>
</div>

<div class="stats-banner">
  <div class="stat-card">
    <div class="card-label">Total Companies</div>
    <div class="card-value" id="statTotalCompanies">0</div>
  </div>
  
  <div class="stats-divider">
    <span>Dept.wise</span>
    <span>Company Visits</span>
  </div>
  
  <div class="stat-card">
    <div class="card-label">CIV</div>
    <div class="card-value" id="statCivOffers">0</div>
  </div>
  <div class="stat-card">
    <div class="card-label">EEE</div>
    <div class="card-value" id="statEeeOffers">0</div>
  </div>
  <div class="stat-card">
    <div class="card-label">MECH</div>
    <div class="card-value" id="statMechOffers">0</div>
  </div>
  <div class="stat-card">
    <div class="card-label">ECE</div>
    <div class="card-value" id="statEceOffers">0</div>
  </div>
  <div class="stat-card">
    <div class="card-label">CSE</div>
    <div class="card-value" id="statCseOffers">0</div>
  </div>
  <div class="stat-card">
    <div class="card-label">IT</div>
    <div class="card-value" id="statItOffers">0</div>
  </div>
  <div class="stat-card">
    <div class="card-label">CSM</div>
    <div class="card-value" id="statCsmOffers">0</div>
  </div>
  <div class="stat-card">
    <div class="card-label">CSD</div>
    <div class="card-value" id="statCsdOffers">0</div>
  </div>
  <div class="stat-card">
    <div class="card-label">MCT</div>
    <div class="card-value" id="statMctOffers">0</div>
  </div>
  <div class="stat-card">
    <div class="card-label">CSB</div>
    <div class="card-value" id="statCsbOffers">0</div>
  </div>
  <div class="stat-card">
    <div class="card-label">MME</div>
    <div class="card-value" id="statMmeOffers">0</div>
  </div>
  <div class="stat-card">
    <div class="card-label">M.Tech</div>
    <div class="card-value" id="statMtechOffers">0</div>
  </div>
</div>

<div class="filter-section controls">
  <input type="text" id="search" placeholder="Search student / roll / company">

  <select id="batchFilter">
    <option value="">Batch</option>
  </select>

  <select id="natureFilter">
    <option value="">Nature</option>
  </select>

  <select id="civFilter"><option value="">CIV</option></select>
  <select id="eeeFilter"><option value="">EEE</option></select>
  <select id="mechFilter"><option value="">MECH</option></select>
  <select id="eceFilter"><option value="">ECE</option></select>
  <select id="cseFilter"><option value="">CSE</option></select>
  <select id="itFilter"><option value="">IT</option></select>
  <select id="csmFilter"><option value="">CSM</option></select>
  <select id="csdFilter"><option value="">CSD</option></select>
  <select id="mctFilter"><option value="">MCT</option></select>
  <select id="csbFilter"><option value="">CSB</option></select>
  <select id="mmeFilter"><option value="">MME</option></select>
  <select id="mtechFilter"><option value="">M.Tech</option></select>
</div>

<div class="action-bar">
  <button class="download-btn" onclick="downloadFilteredExcel()">
    📊 Download Filtered Data (Excel)
  </button>
</div>

<div class="table-container">
<table id="placementTable">
<thead></thead>
<tbody></tbody>
</table>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQLvIzLjDAXJNUBylFC6GM5By6ERH-2I_RncTJ6RD8WQIhftjo_FYV54sWphnPHqu7i5LzPdY_NoUEJ/pub?gid=1580683414&single=true&output=csv";

let allData=[];
let currentFilteredData=[]; 
let natureKey = "";
let totalKey = "";
let companyNameKey = "";
let eligibleBranchesKey = "";

let deptKeys = { civ: "", eee: "", mech: "", ece: "", cse: "", it: "", csm: "", csd: "", mct: "", csb: "", mme: "", mtech: "" };

/* INITIALIZE PARSING SEQUENCE */
Papa.parse(csvURL,{
download:true,
header:true,
skipEmptyLines:true,
complete:function(results){
allData = results.data.filter(
row => Object.values(row).join("").trim() !== ""
);

if(allData.length===0){
buildTable([]);
return;
}

let headers = Object.keys(allData[0]);

let cleanString = (str) => str ? str.toLowerCase().replace(/[\s\.\-_]/g, "").trim() : "";
let findKey = (arr, fallback) => headers.find(h => arr.some(term => cleanString(h).includes(term))) || fallback;

natureKey = findKey(["natureofthecompany", "naturecompany", "nature"], "");
totalKey = headers.find(h => h.toLowerCase().trim() === "total") || "";
companyNameKey = findKey(["companyname", "companyplaced", "company"], "");
eligibleBranchesKey = findKey(["eligiblebranches", "eligibility", "branches"], "");

Object.keys(deptKeys).forEach(k => {
  let lookup = (k === "mtech") ? "mtech" : k;
  deptKeys[k] = headers.find(h => cleanString(h) === lookup) || headers.find(h => cleanString(h).includes(lookup)) || "";
});

currentFilteredData = [...allData];
buildTable(allData);
populateFilters(allData);
updateLiveMetrics(allData);
},
error:function(err){
console.error(err);
buildTable([]);
alert("CSV Loading Failed. Check Sheet publishing settings.");
}
});

/* TABLE DOM GENERATOR */
function buildTable(data){
let thead=document.querySelector("#placementTable thead");
let tbody=document.querySelector("#placementTable tbody");

thead.innerHTML="";
tbody.innerHTML="";

if(data.length===0){
tbody.innerHTML="<tr><td colspan='25' style='padding: 20px; font-weight: bold; text-align:center; color:#222;'>No Records Found Matching Criteria</td></tr>";
return;
}

let headers=Object.keys(data[0]);
let tr=document.createElement("tr");

headers.forEach(h=>{
  let th=document.createElement("th");
  th.innerText=h;
  tr.appendChild(th);
});
thead.appendChild(tr);

data.forEach(row=>{
let tr=document.createElement("tr");
headers.forEach(h=>{
let td=document.createElement("td");
let value = row[h] ? row[h].toString().trim() : "";

td.title = value; 

if(value.toLowerCase().startsWith("http")){
let a=document.createElement("a");
a.href=value;
a.target="_blank";
a.className="link-btn";

if(h.toLowerCase().includes("intern")){
a.innerText="📄 Intern";
}
else if(h.toLowerCase().includes("offer")){
a.innerText="📄 Offer";
}
else{
a.innerText="📄 Link";
}
td.appendChild(a);
}
else{
td.innerText=value;
}
tr.appendChild(td);
});
tbody.appendChild(tr);
});
}

/* INITIAL DROPDOWN OPTION SETUPS */
function populateFilters(data){
let getDropdownOpts = (key) => key ? [...new Set(data.map(d=> (d[key] || "").trim()).filter(Boolean))].sort() : [];

let batches = data.length > 0 && Object.keys(data[0]).includes("Batch") ? [...new Set(data.map(d=>d["Batch"]).filter(Boolean))].sort() : [];
let natures = getDropdownOpts(natureKey);

let updateSelect = (id, list, defaultText) => {
  let el = document.getElementById(id);
  if(!el) return;
  el.innerHTML = `<option value="">${defaultText}</option>`;
  list.forEach(v => el.add(new Option(v,v)));
};

updateSelect("batchFilter", batches, "Batch");
updateSelect("natureFilter", natures, "Nature");

Object.keys(deptKeys).forEach(branch => {
  let key = deptKeys[branch];
  let opts = getDropdownOpts(key);
  let label = branch === "mtech" ? "M.Tech" : branch.toUpperCase();
  updateSelect(branch + "Filter", opts, label);
});
}

/* REAL-TIME METRICS COMPILER */
function updateLiveMetrics(currentFilteredData) {
  let uniqueCompanies = new Set();
  let sums = { civ: 0, eee: 0, mech: 0, ece: 0, cse: 0, it: 0, csm: 0, csd: 0, mct: 0, csb: 0, mme: 0, mtech: 0 };

  currentFilteredData.forEach(row => {
    if (companyNameKey && row[companyNameKey]) {
      uniqueCompanies.add(row[companyNameKey].toString().trim().toLowerCase());
    }
    
    Object.keys(sums).forEach(branch => {
      let key = deptKeys[branch];
      if (key && row[key]) {
        let cellVal = row[key].toString().trim().toLowerCase();
        if (cellVal === "yes") {
          sums[branch] += 1;
        }
      }
    });
  });

  let setVal = (id, val) => { let el = document.getElementById(id); if(el) el.innerText = val; };
  setVal("statTotalCompanies", uniqueCompanies.size);
  setVal("statCivOffers", sums.civ);
  setVal("statEeeOffers", sums.eee);
  setVal("statMechOffers", sums.mech);
  setVal("statEceOffers", sums.ece);
  setVal("statCseOffers", sums.cse);
  setVal("statItOffers", sums.it);
  setVal("statCsmOffers", sums.csm);
  setVal("statCsdOffers", sums.csd);
  setVal("statMctOffers", sums.mct);
  setVal("statCsbOffers", sums.csb);
  setVal("statMmeOffers", sums.mme);
  setVal("statMtechOffers", sums.mtech);
}

/* PRIMARY FILTER COMPILER */
function applyFilters(){
if(allData.length === 0) return;

let getVal = (id) => document.getElementById(id) ? document.getElementById(id).value : "";
let search = getVal("search").toLowerCase();
let batch = getVal("batchFilter");
let nature = getVal("natureFilter");

let branchVals = {};
Object.keys(deptKeys).forEach(branch => {
  branchVals[branch] = getVal(branch + "Filter");
});

currentFilteredData=allData.filter(row=>{
let text=JSON.stringify(row).toLowerCase();
let rowMatch = (key, val) => val === "" || !key || (row[key] || "").trim() === val;

let matchesBranches = true;
Object.keys(deptKeys).forEach(branch => {
  let targetVal = branchVals[branch];
  if (targetVal !== "") {
    if (!rowMatch(deptKeys[branch], targetVal)) {
      matchesBranches = false;
    }
  }
});

return text.includes(search)
&& (batch === "" || row["Batch"] === batch)
&& rowMatch(natureKey, nature)
&& matchesBranches;
});

buildTable(currentFilteredData);
updateLiveMetrics(currentFilteredData);
}

/* NATIVE EXCEL WORKBOOK GENERATOR ENGINE */
function downloadFilteredExcel() {
  if (currentFilteredData.length === 0) {
    alert("No records available to export.");
    return;
  }
  
  // Create a new blank Excel virtual Workbook pipeline context
  let wb = XLSX.utils.book_new();
  
  // Directly maps JSON layout data stream directly into sheet structured row items
  let ws = XLSX.utils.json_to_sheet(currentFilteredData);
  
  // Append sheet reference to workbook matching project name
  XLSX.utils.book_append_sheet(wb, ws, "Placement Report Data");
  
  // Compile binary buffers and fire download package instantly
  XLSX.writeFile(wb, "MGIT_Filtered_Placement_Report.xlsx");
}

/* EVENT BINDINGS */
document.getElementById("search").addEventListener("input",applyFilters);
document.getElementById("batchFilter").addEventListener("change",applyFilters);
document.getElementById("natureFilter").addEventListener("change",applyFilters);

Object.keys(deptKeys).forEach(branch => {
  let el = document.getElementById(branch + "Filter");
  if(el) el.addEventListener("change", applyFilters);
});
</script>
</body>
</html>
