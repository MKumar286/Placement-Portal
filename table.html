<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSV Data</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial;
    background:#f5f7ff;

    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ===== HEADER ===== */

.header{
    width:90%;
    max-width:1400px;

    margin:20px auto;

    padding:30px;

    border-radius:18px;

    background:linear-gradient(
        135deg,
        #014d40,
        #01695c,
        #018786,
        #26a69a
    );

    text-align:center;

    box-shadow:
        0 8px 25px rgba(0,0,0,0.25),
        inset 0 0 20px rgba(255,255,255,0.08);

    border:2px solid rgba(255,255,255,0.12);

    animation:fadeDown 0.8s ease;
}

/* MAIN HEADING */

.header h1{
    margin:0;
    color:white;
    font-size:36px;
    font-weight:800;
    letter-spacing:1px;
    text-transform:uppercase;

    text-shadow:
        2px 2px 8px rgba(0,0,0,0.4);
}

/* SUB HEADING */

.header h2{
    margin-top:10px;
    color:#e0fff7;
    font-size:22px;
    font-weight:500;
    letter-spacing:1px;

    text-shadow:
        1px 1px 5px rgba(0,0,0,0.3);
}

/* ANIMATION */

@keyframes fadeDown{

    from{
        opacity:0;
        transform:translateY(-25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* TABLE */

.table-container{
    width:95%;
    overflow-x:auto;
    margin-top:20px;
}
/* ===== 3D TABLE DESIGN ===== */

table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    margin-top:25px;
    background:white;

    border-radius:18px;
    overflow:hidden;

    box-shadow:
        0 10px 25px rgba(0,0,0,0.18),
        0 4px 10px rgba(0,0,0,0.12);

    table-layout:auto;
    width:max-content;
    min-width:100%;
}

/* HEADER */

th{
    background:linear-gradient(
        135deg,
        #0b3d91,
        #1565c0,
        #1e88e5
    );

    color:white;

    padding:14px;

    font-size:16px;
    font-weight:700;

    text-align:center;

    border:none;

    letter-spacing:0.5px;

    text-shadow:
        1px 1px 4px rgba(0,0,0,0.4);

    position:sticky;
    top:0;
}

/* TABLE CELLS */

td{
    padding:12px;

    text-align:center;

    border-bottom:1px solid #e0e0e0;

    background:white;

    transition:0.3s ease;

    word-wrap:break-word;
    word-break:break-word;
}
/* ROW HOVER EFFECT */

tr:hover td{

    background:#e8f0ff;

    transform:scale(1.01);

    box-shadow:
        inset 0 0 8px rgba(0,0,0,0.05);
}

/* ALTERNATE ROW COLORS */

tr:nth-child(even) td{
    background:#f7f9ff;
}

/* SMOOTH EFFECT */

table tr{
    transition:0.3s ease;
}

/* LOADING */

.loading{
    text-align:center;
    font-size:22px;
    color:#0b3d91;
    margin-top:30px;
}

/* BACK BUTTON */

.back-btn{
    padding:10px 20px;
    background:#0b3d91;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:20px;
}

.back-btn:hover{
    background:#082c6c;
}

</style>
</head>

<body>

<button class="back-btn" onclick="history.back()">← Back</button>

<div class="header">

    <h1>Mahatma Gandhi Institute of Technology</h1>

    <h2>Training & Placement Cell</h2>

</div>

<div class="loading" id="loading">
Loading Data...
</div>

<div class="table-container">
    <table id="dataTable"></table>
</div>

<script>

const csvURL = localStorage.getItem("csvURL");

Papa.parse(csvURL, {

    download: true,

    complete: function(results){

        let data = results.data;

        let tableHTML = "";

        data.forEach((row, rowIndex)=>{

            tableHTML += "<tr>";

            row.forEach(cell=>{

                if(rowIndex === 0){
                    tableHTML += `<th>${cell}</th>`;
                }else{
                    tableHTML += `<td>${cell}</td>`;
                }

            });

            tableHTML += "</tr>";

        });

        document.getElementById("dataTable").innerHTML = tableHTML;

        document.getElementById("loading").style.display = "none";

    },

    error: function(){

        document.getElementById("loading").innerHTML =
        "Unable to Load CSV Data";

    }

});

</script>

</body>
</html>
