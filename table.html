<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Data Table</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial;
    background:#eef2ff;
}

/* HEADER */

.header{
    width:95%;
    margin:auto;
    padding:25px;
    border-radius:20px;
    text-align:center;

    background:linear-gradient(135deg,#014d40,#01695c,#018786,#26a69a);

    box-shadow:
        0 8px 20px rgba(0,0,0,0.25),
        inset 0 0 10px rgba(255,255,255,0.08);
}

.header h1{
    margin:0;
    color:white;
    font-size:34px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.header h2{
    margin-top:10px;
    color:#e8fdf9;
    font-weight:400;
}

/* CARDS */

.cards-container{
    width:60%;
    margin-top:20px;
    margin-bottom:20px;

    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;

    box-shadow:
        10px 10px 20px rgba(0,0,0,0.12),
        -5px -5px 15px rgba(255,255,255,0.8);

    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    margin:0;
    font-size:17px;
    color:#2c3e50;
}

.card p{
    margin-top:12px;
    font-size:32px;
    font-weight:bold;
    color:#0b3d91;
}

/* FILTERS */

.filter-container{
    width:95%;
    margin:auto;
    margin-bottom:20px;

    display:flex;
    gap:10px;
    flex-wrap:nowrap;
    overflow-x:auto;
}

.filter-container input,
.filter-container select{

    padding:10px;
    border-radius:10px;
    border:none;
    min-width:170px;

    background:white;

    box-shadow:
        inset 2px 2px 5px rgba(0,0,0,0.08),
        inset -2px -2px 5px rgba(255,255,255,0.9);
}

/* RECORD COUNT */

.record-count{
    width:95%;
    margin:auto;
    margin-bottom:10px;

    font-size:18px;
    font-weight:bold;
    color:#0b3d91;
}

/* TABLE */

/* ===== TABLE CONTAINER ===== */



/* ===== 3D TABLE ===== */

table{

    width:max-content;

    min-width:100%;

    border-collapse:separate;

    border-spacing:0;

    table-layout:auto;

    background:white;

    border-radius:18px;

    overflow:hidden;
}

/* ===== TABLE HEADERS ===== */

th{

    background:linear-gradient(
        135deg,
        #0b3d91,
        #1565c0,
        #1e88e5
    );

    color:white;

    padding:14px 18px;

    font-size:15px;

    font-weight:700;

    text-align:center;

    letter-spacing:0.5px;

    border:none;

    position:sticky;

    top:0;

    z-index:2;

    white-space:nowrap;

    width:auto;

    text-shadow:
        1px 1px 4px rgba(0,0,0,0.3);
}

/* ===== TABLE DATA ===== */

td{

    padding:12px 18px;

    text-align:center;

    border-bottom:1px solid #e0e0e0;

    background:white;

    transition:0.3s ease;

    white-space:nowrap;

    width:auto;
}

/* ===== ALTERNATE ROW COLORS ===== */

tr:nth-child(even) td{

    background:#f7f9ff;
}

/* ===== ROW HOVER EFFECT ===== */

tr:hover td{

    background:#e8f0ff;

    transform:scale(1.01);

    box-shadow:
        inset 0 0 8px rgba(0,0,0,0.05);
}

/* LOADING */

.loading{
    text-align:center;
    margin-top:30px;
    font-size:24px;
    color:#0b3d91;
}
    /* ===== ALWAYS SHOW HORIZONTAL SCROLL ===== */

.table-container{
    width:95%;
    overflow-x:scroll;
    overflow-y:auto;

    margin-top:20px;

    border-radius:18px;

    scrollbar-width:thin;
}

/* ===== GREEN SCROLLBAR ===== */

.table-container::-webkit-scrollbar{
    height:12px;
}

.table-container::-webkit-scrollbar-track{
    background:#d7f5e8;
    border-radius:10px;
}

.table-container::-webkit-scrollbar-thumb{
    background:linear-gradient(
        135deg,
        #00b894,
        #00cec9
    );

    border-radius:10px;
}

/* ===== GREEN CURSOR FOCUS ===== */

input:focus,
select:focus{

    outline:none;

    border:2px solid #00b894;

    box-shadow:
        0 0 10px rgba(0,184,148,0.5);

    transition:0.3s;
}

/* ===== SEARCH BAR GREEN THEME ===== */

.search-box input{

    border:2px solid #b2f5ea;
}

.search-box input:focus{

    border:2px solid #00b894;

    box-shadow:
        0 0 12px rgba(0,184,148,0.4);
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

    <h1>Mahatma Gandhi Institute of Technology</h1>

    <h2>Training & Placement Cell</h2>

</div>

<!-- CARDS -->

<div class="cards-container">

    <div class="card">
        <h3>Total Students</h3>
        <p id="totalStudents">0</p>
    </div>

    <div class="card">
        <h3>Registered for Placements</h3>
        <p id="registeredStudents">0</p>
    </div>

    <div class="card">
        <h3>Eligible Students</h3>
        <p id="eligibleStudents">0</p>
    </div>

    <div class="card">
        <h3>Total Students Placed</h3>
        <p id="placedStudents">0</p>
    </div>

    <div class="card">
        <h3>Total Offers</h3>
        <p id="totalOffers">0</p>
    </div>

</div>

<!-- FILTERS -->

<div class="filter-container">

    <input type="text" id="searchInput" placeholder="Search Any Data">

    <select id="branchFilter">
        <option value="">Branch</option>
    </select>

    <select id="backlogFilter">
        <option value="">No. of Backlogs</option>
    </select>

    <select id="genderFilter">
        <option value="">Gender</option>
    </select>

    <select id="cgpaFilter">
        <option value="">CGPA</option>
    </select>

    <select id="registeredFilter">
        <option value="">Registered for Placements</option>
    </select>

    <select id="offersFilter">
        <option value="">No. of Offers</option>
    </select>

</div>

<!-- RECORD COUNT -->

<div class="record-count">
    Total Records : <span id="recordCount">0</span>
</div>

<!-- LOADING -->

<div class="loading" id="loading">
Loading Data...
</div>

<!-- TABLE -->

<div class="table-container">

    <table id="dataTable"></table>

</div>

<script>

const csvURL = localStorage.getItem("csvURL");

let originalData = [];
let headers = [];

Papa.parse(csvURL, {

    download:true,
    skipEmptyLines:true,

    complete:function(results){

        headers = results.data[0];
        originalData = results.data.slice(1);

        populateFilters(originalData);

        applyFilters();

        document.getElementById("loading").style.display = "none";
    }
});

/* FILTER IDS */

const searchInput = document.getElementById("searchInput");

const branchFilter = document.getElementById("branchFilter");
const backlogFilter = document.getElementById("backlogFilter");
const genderFilter = document.getElementById("genderFilter");
const cgpaFilter = document.getElementById("cgpaFilter");
const registeredFilter = document.getElementById("registeredFilter");
const offersFilter = document.getElementById("offersFilter");

/* EVENTS */

searchInput.addEventListener("input",applyFilters);

branchFilter.addEventListener("change",applyFilters);
backlogFilter.addEventListener("change",applyFilters);
genderFilter.addEventListener("change",applyFilters);
cgpaFilter.addEventListener("change",applyFilters);
registeredFilter.addEventListener("change",applyFilters);
offersFilter.addEventListener("change",applyFilters);

/* POPULATE FILTERS */

function populateFilters(data){

    fillFilter(branchFilter,"Branch",data);

    fillFilter(backlogFilter,"No. of Backlogs",data);

    fillFilter(genderFilter,"Gender",data);

    fillFilter(cgpaFilter,"CGPA",data);

    fillFilter(registeredFilter,"Registered for Placements",data);

    fillFilter(offersFilter,"No. of Offers",data);
}

/* FILL FILTER */

function fillFilter(filter,column,data){

    const index = headers.indexOf(column);

    let values = [...new Set(

        data.map(row => row[index])

    )];

    values = values.filter(v => v !== "");

    filter.innerHTML =
    `<option value="">${column}</option>`;

    values.sort().forEach(value=>{

        filter.innerHTML +=
        `<option value="${value}">${value}</option>`;

    });
}

/* APPLY FILTERS */

function applyFilters(){

    const search = searchInput.value.toLowerCase();

    const filters = {

        branch: branchFilter.value,
        backlog: backlogFilter.value,
        gender: genderFilter.value,
        cgpa: cgpaFilter.value,
        registered: registeredFilter.value,
        offers: offersFilter.value
    };

    const indexes = {

        branch: headers.indexOf("Branch"),
        backlog: headers.indexOf("No. of Backlogs"),
        gender: headers.indexOf("Gender"),
        cgpa: headers.indexOf("CGPA"),
        registered: headers.indexOf("Registered for Placements"),
        offers: headers.indexOf("No. of Offers")
    };

    let filtered = originalData.filter(row=>{

        const rowText = row.join(" ").toLowerCase();

        return (

            rowText.includes(search)

            &&

            (!filters.branch ||
            row[indexes.branch] === filters.branch)

            &&

            (!filters.backlog ||
            row[indexes.backlog] === filters.backlog)

            &&

            (!filters.gender ||
            row[indexes.gender] === filters.gender)

            &&

            (!filters.cgpa ||
            row[indexes.cgpa] === filters.cgpa)

            &&

            (!filters.registered ||
            row[indexes.registered]
            .toLowerCase()
            .trim() ===
            filters.registered
            .toLowerCase()
            .trim())

            &&

            (!filters.offers ||
            row[indexes.offers] === filters.offers)

        );

    });

    createTable(headers,filtered);

    updateStatistics(filtered);
}

/* CREATE TABLE */

function createTable(headers,rows){

    let tableHTML = "<tr>";

    headers.forEach(header=>{

        tableHTML += `<th>${header}</th>`;

    });

    tableHTML += "</tr>";

    rows.forEach(row=>{

        tableHTML += "<tr>";

        row.forEach(cell=>{

            tableHTML += `<td>${cell}</td>`;

        });

        tableHTML += "</tr>";
    });

    document.getElementById("dataTable").innerHTML = tableHTML;

    document.getElementById("recordCount").innerText =
    rows.length;
}

/* UPDATE STATISTICS */

function updateStatistics(data){

    const indexes = {

        cgpa: headers.indexOf("CGPA"),

        registered:
        headers.indexOf("Registered for Placements"),

        offers:
        headers.indexOf("No. of Offers")
    };

    const totalStudents = data.length;

    const placedStudents = data.filter(row=>{

        const offers = row[indexes.offers];

        return offers !== "" &&
               offers != null &&
               Number(offers) > 0;

    }).length;

    const totalOffers = data.reduce((sum,row)=>{

        return sum +
        (Number(row[indexes.offers]) || 0);

    },0);

    const registeredStudents = data.filter(row=>{

        return String(row[indexes.registered])

        .toLowerCase()

        .trim() === "yes";

    }).length;

    const eligibleStudents = data.filter(row=>{

        const cgpa =
        parseFloat(row[indexes.cgpa]) || 0;

        const registered =
        String(row[indexes.registered])

        .toLowerCase()

        .trim();

        return cgpa >= 6.5 &&
               registered === "yes";

    }).length;

    document.getElementById("totalStudents")
    .innerText = totalStudents;

    document.getElementById("placedStudents")
    .innerText = placedStudents;

    document.getElementById("totalOffers")
    .innerText = totalOffers;

    document.getElementById("registeredStudents")
    .innerText = registeredStudents;

    document.getElementById("eligibleStudents")
    .innerText = eligibleStudents;
}

</script>

</body>
</html>
