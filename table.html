<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSV Data</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial;
    background:#f5f7ff;
}

/* ===== HEADER SECTION ===== */

/* ===== PROFESSIONAL HEADER ===== */

.header{
    width:100%;
    padding:28px;
    border-radius:18px;

    background:linear-gradient(
        135deg,
        #001f4d,
        #003c8f,
        #0059d6,
        #1976d2
    );

    background-size:300% 300%;

    animation:gradientMove 8s ease infinite,
              fadeDown 0.8s ease;

    text-align:center;

    box-shadow:
        0 8px 25px rgba(0,0,0,0.25),
        inset 0 0 20px rgba(255,255,255,0.08);

    border:2px solid rgba(255,255,255,0.12);
}

/* MAIN HEADING */

.header h1{
    margin:0;
    color:white;
    font-size:36px;
    font-weight:800;
    letter-spacing:1px;
    text-transform:uppercase;

    text-shadow:
        2px 2px 8px rgba(0,0,0,0.4);
}

/* SUB HEADING */

.header h2{
    margin-top:10px;
    color:#dbe9ff;
    font-size:22px;
    font-weight:500;
    letter-spacing:1px;

    text-shadow:
        1px 1px 5px rgba(0,0,0,0.3);
}

/* GRADIENT ANIMATION */

@keyframes gradientMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }

}

/* FADE EFFECT */

@keyframes fadeDown{

    from{
        opacity:0;
        transform:translateY(-25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.header h1{
    margin:0;
    color:white;
    font-size:34px;
    letter-spacing:1px;
    text-transform:uppercase;
}

.header h2{
    margin-top:8px;
    color:#e3f2fd;
    font-size:22px;
    font-weight:400;
    letter-spacing:1px;
}

/* Animation */

@keyframes fadeDown{

    from{
        opacity:0;
        transform:translateY(-20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:20px;
    table-layout:auto;
}

th, td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
    white-space:nowrap;
}

.table-container{
    width:100%;
    overflow-x:auto;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#0b3d91;
    color:white;
}

.loading{
    text-align:center;
    font-size:22px;
    color:#0b3d91;
    margin-top:30px;
}

.back-btn{
    padding:10px 20px;
    background:#0b3d91;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:20px;
}

</style>
</head>

<body>

<button class="back-btn" onclick="history.back()">← Back</button>

<div class="header">

    <h1>Mahatma Gandhi Institute of Technology</h1>

    <h2>Training & Placement Cell</h2>

</div>

<div class="loading" id="loading">
Loading Data...
</div>

<div class="table-container">
    <table id="dataTable"></table>
</div>

<script>

const csvURL = localStorage.getItem("csvURL");

Papa.parse(csvURL, {

    download: true,

    complete: function(results){

        let data = results.data;

        let tableHTML = "";

        data.forEach((row, rowIndex)=>{

            tableHTML += "<tr>";

            row.forEach(cell=>{

                if(rowIndex === 0){
                    tableHTML += `<th>${cell}</th>`;
                }else{
                    tableHTML += `<td>${cell}</td>`;
                }

            });

            tableHTML += "</tr>";

        });

        document.getElementById("dataTable").innerHTML = tableHTML;

        document.getElementById("loading").style.display = "none";

    },

    error: function(){

        document.getElementById("loading").innerHTML =
        "Unable to Load CSV Data";

    }

});

</script>

</body>
</html>
