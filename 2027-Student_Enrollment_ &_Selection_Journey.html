<!DOCTYPE html>
<html>
<head>

<title>MGIT Placement Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
padding:15px;
padding-bottom: 80px; /* Space so the download button doesn't block the last table row */
overflow-x:hidden;
color:white;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c3c);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
min-height:100vh;
}

/* Animated Background */

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating Glow */

body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:rgba(0,198,255,0.15);
border-radius:50%;
top:-120px;
left:-120px;
filter:blur(100px);
animation:float1 10s infinite alternate;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:400px;
height:400px;
background:rgba(255,0,150,0.15);
border-radius:50%;
bottom:-100px;
right:-100px;
filter:blur(100px);
animation:float2 12s infinite alternate;
z-index:-1;
}

@keyframes float1{
from{transform:translateY(0px);}
to{transform:translateY(80px);}
}

@keyframes float2{
from{transform:translateX(0px);}
to{transform:translateX(-80px);}
}

/* HEADER */

.header-box{
background:linear-gradient(135deg,#000814,#001d3d,#003566);
padding:15px 10px;
border-radius:18px 18px 0 0;
margin-bottom:0;
box-shadow:0 6px 20px rgba(0,0,0,0.35);
border:1px solid rgba(255,255,255,0.15);
border-bottom:none;
text-align:center;
}


/* HEADINGS */

h1{
font-size:34px;
font-weight:bold;
background:linear-gradient(90deg,#ffffff,#ffe082,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:8px;
letter-spacing:1px;
}

h3{
font-size:18px;
margin-top:2px;
font-weight:500;
background:linear-gradient(90deg,#b2ff59,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* STATS CONTAINER & CARDS */
.stats-container {
display: flex;
flex-direction: column;
background: linear-gradient(135deg, #051329, #0a2246);
padding: 10px;
border-left: 1px solid rgba(255,255,255,0.15);
border-right: 1px solid rgba(255,255,255,0.15);
gap: 8px;
}

.stats-row {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
gap: 8px;
width: 100%;
}

.stats-card {
background: rgba(255, 255, 255, 0.06);
border-radius: 8px;
padding: 6px 8px;
font-size: 11px;
line-height: 1.2;
color: #e0e6ed;
display: flex;
flex-direction: column;
justify-content: center;
box-shadow: 0 4px 15px rgba(0,0,0,0.2);
transition: transform 0.2s;
min-height: 52px;
}

.stats-card:hover {
transform: translateY(-2px);
}

.stats-card span {
font-weight: bold;
font-size: 15px;
margin-top: 2px;
}

/* Unique Vibrant Border and Text Color Mapping */
.border-blue { border: 1px solid #00bcff; }
.border-blue span { color: #00bcff; }

.border-cyan { border: 1px solid #00f5d4; }
.border-cyan span { color: #00f5d4; }

.border-orange { border: 1px solid #ff9f1c; }
.border-orange span { color: #ff9f1c; }

.border-amber { border: 1px solid #ffd166; }
.border-amber span { color: #ffd166; }

.border-purple { border: 1px solid #b5179e; }
.border-purple span { color: #f72585; }

.border-pink { border: 1px solid #7209b7; }
.border-pink span { color: #b5179e; }

.border-green { border: 1px solid #38b000; background: rgba(56, 176, 0, 0.08); }
.border-green span { color: #00ff66; text-shadow: 0 0 8px rgba(0,255,102,0.4); }

/* FILTER CONTAINER */
.filter-container {
display: flex;
flex-direction: column;
background:rgba(255,255,255,0.12);
padding: 12px;
border-radius:0 0 14px 14px;
backdrop-filter:blur(10px);
box-shadow:0 6px 20px rgba(0,0,0,0.25);
border:1px solid rgba(255,255,255,0.15);
border-top:none;
margin-bottom:15px;
gap: 10px;
}

/* FILTER SECTION CONTROLS (Split into identical structured rows) */
.controls{
display: grid;
grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
gap: 10px;
width: 100%;
}

/* FILTERS */
.controls input,
.controls select{
width: 100%;
height: 36px;
padding: 6px 10px;
font-size: 13px;
border-radius: 8px;
border: 1px solid rgba(255,255,255,0.2);
outline: none;
background: rgba(255,255,255,0.92);
transition: 0.3s;
color: #222;
}

/* Make search bar span 2 default spaces for dynamic symmetry if room permits */
.controls input[type="text"] {
grid-column: span 2;
}

/* FOCUS */
.controls input:focus,
.controls select:focus{
transform:scale(1.01);
box-shadow:0 0 10px rgba(255,255,255,0.5);
border:1px solid #00c6ff;
}

/* TABLE CONTAINER */
.table-container{
width:100%;
overflow-x:auto;
overflow-y:hidden;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.35);
scroll-behavior:smooth;
background:rgba(255,255,255,0.05);
padding-bottom:6px;
}

/* TABLE SCROLLBAR */
.table-container::-webkit-scrollbar{
height:10px;
}

.table-container::-webkit-scrollbar-track{
background:rgba(255,255,255,0.08);
border-radius:10px;
}

.table-container::-webkit-scrollbar-thumb{
background:linear-gradient(90deg,#ff512f,#dd2476);
border-radius:10px;
}

.table-container::-webkit-scrollbar-thumb:hover{
background:linear-gradient(90deg,#00c6ff,#0072ff);
}

/* TABLE */
table{
border-collapse:collapse;
min-width:1600px;
width:max-content;
background:#ffffff;
color:#222;
border-radius:18px;
overflow:hidden;
}

/* TABLE HEADER */
th{
padding:10px 12px;
font-size:13px;
font-weight:bold;
text-align:center;
background:linear-gradient(135deg,#141e30,#243b55);
color:#ffffff;
line-height:1.3;
border:1px solid rgba(255,255,255,0.12);
white-space:nowrap;
}

/* TABLE DATA */
td{
padding:8px 12px;
font-size:12px;
font-weight:500;
text-align:center;
white-space:nowrap;
border:1px solid rgba(16,37,66,0.12);
}

/* ROW COLORS */
tr:nth-child(even){
background:#eef5ff;
}

tr:nth-child(odd){
background:#ffffff;
}

/* HOVER */
tbody tr:hover{
background:#ffd180;
transition:0.3s;
}

/* BUTTON */
.link-btn{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
padding:4px 10px;
border-radius:6px;
text-decoration:none;
font-size:11px;
font-weight:bold;
line-height:1.2;
display:inline-block;
transition:0.3s;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.link-btn:hover{
transform:scale(1.06);
background:linear-gradient(135deg,#43cea2,#185a9d);
}

/* FIXED BOTTOM EXCEL BUTTON */
.download-wrapper {
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
z-index: 1000;
display: flex;
justify-content: center;
width: auto;
}

.excel-btn {
background: linear-gradient(135deg, #1d6f42, #105230);
color: #ffffff;
padding: 12px 24px;
border-radius: 30px;
font-size: 14px;
font-weight: bold;
border: 2px solid rgba(255,255,255,0.2);
cursor: pointer;
box-shadow: 0 8px 30px rgba(0,0,0,0.5);
display: flex;
align-items: center;
gap: 8px;
transition: all 0.3s ease;
white-space: nowrap;
backdrop-filter: blur(5px);
}

.excel-btn:hover {
transform: scale(1.05);
background: linear-gradient(135deg, #248a52, #13633a);
box-shadow: 0 10px 35px rgba(0, 245, 212, 0.3);
border-color: #00f5d4;
}

.excel-btn:active {
transform: scale(0.98);
}

/* RESPONSIVE BREAKPOINT FOR MOBILE DEVICES */
@media(max-width:768px){

body{
padding:10px;
padding-bottom: 75px;
